<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 260" role="img" aria-label="Streak fire core v2">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060b16"/>
      <stop offset="55%" stop-color="#111c35"/>
      <stop offset="100%" stop-color="#1c2f56"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff0bf"/>
      <stop offset="45%" stop-color="#ffab52"/>
      <stop offset="100%" stop-color="#ff4d00"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4d00"/>
      <stop offset="50%" stop-color="#ffd166"/>
      <stop offset="100%" stop-color="#00d1b2"/>
    </linearGradient>
    <linearGradient id="meteor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="35%" stop-color="#ffd166" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ff4d00" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="520" height="260" rx="18" fill="url(#panel)"/>
  <rect x="8" y="8" width="504" height="244" rx="14" fill="none" stroke="#2d4f7a" stroke-opacity="0.45"/>

  <g opacity="0.16" fill="#7da6df">
    <circle cx="44" cy="42" r="1.7"/>
    <circle cx="112" cy="66" r="1.3"/>
    <circle cx="188" cy="36" r="1.5"/>
    <circle cx="258" cy="70" r="1.6"/>
    <circle cx="328" cy="46" r="1.3"/>
    <circle cx="402" cy="62" r="1.7"/>
    <circle cx="470" cy="40" r="1.4"/>
  </g>

  <g id="dragon-shadow" transform="translate(38 105)" opacity="0.26">
    <animateTransform attributeName="transform" type="translate" values="38 105;58 102;38 105" dur="6s" repeatCount="indefinite"/>
    <path d="M20 62 L84 30 L160 22 L196 36 L242 34 L204 54 L262 62 L212 74 L188 104 L146 90 L120 98 L104 82 L64 88 Z" fill="#0f1930" stroke="#4c74a9" stroke-opacity="0.55" stroke-width="2"/>
    <path d="M108 40 L140 28 L168 42 L152 58 L120 56 Z" fill="#4c74a9" fill-opacity="0.56"/>
    <path d="M258 62 C306 46, 364 48, 430 60 C366 86, 304 84, 258 74 Z" fill="#ff6a00" fill-opacity="0.5"/>
  </g>

  <g filter="url(#glow)">
    <circle cx="260" cy="130" r="44" fill="url(#core)">
      <animate attributeName="r" values="40;49;40" dur="1.7s" repeatCount="indefinite"/>
    </circle>

    <circle cx="260" cy="130" r="78" fill="none" stroke="url(#ring)" stroke-width="6" stroke-linecap="round" stroke-dasharray="60 18 24 14">
      <animateTransform attributeName="transform" type="rotate" from="0 260 130" to="360 260 130" dur="6.6s" repeatCount="indefinite"/>
    </circle>

    <circle cx="260" cy="130" r="104" fill="none" stroke="#00d1b2" stroke-opacity="0.42" stroke-width="2" stroke-dasharray="8 12">
      <animateTransform attributeName="transform" type="rotate" from="360 260 130" to="0 260 130" dur="9.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g id="meteors" stroke-linecap="round" opacity="0.95">
    <line x1="-120" y1="26" x2="-30" y2="56" stroke="url(#meteor)" stroke-width="3.4">
      <animate attributeName="x1" values="-120;540" dur="3.8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="-30;630" dur="3.8s" repeatCount="indefinite"/>
      <animate attributeName="y1" values="26;188" dur="3.8s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="56;218" dur="3.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="3.8s" repeatCount="indefinite"/>
    </line>
    <line x1="-180" y1="78" x2="-95" y2="102" stroke="url(#meteor)" stroke-width="2.8">
      <animate attributeName="x1" values="-180;520" dur="3.1s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="-95;605" dur="3.1s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="y1" values="78;198" dur="3.1s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="102;224" dur="3.1s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.92;0" dur="3.1s" begin="0.6s" repeatCount="indefinite"/>
    </line>
    <line x1="-220" y1="34" x2="-140" y2="58" stroke="url(#meteor)" stroke-width="2.2">
      <animate attributeName="x1" values="-220;500" dur="2.6s" begin="1.1s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="-140;580" dur="2.6s" begin="1.1s" repeatCount="indefinite"/>
      <animate attributeName="y1" values="34;176" dur="2.6s" begin="1.1s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="58;200" dur="2.6s" begin="1.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.85;0" dur="2.6s" begin="1.1s" repeatCount="indefinite"/>
    </line>
  </g>

  <text x="260" y="36" text-anchor="middle" fill="#e7f1ff" font-family="Segoe UI, Tahoma, sans-serif" font-size="20" font-weight="700" letter-spacing="1.1">STREAK REACTOR</text>
  <text x="260" y="228" text-anchor="middle" fill="#8ac9ff" font-family="Segoe UI, Tahoma, sans-serif" font-size="14" font-weight="600" letter-spacing="1.6">CONSISTENCY POWERS THE FIRE</text>
</svg>
