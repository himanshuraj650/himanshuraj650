<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 260" role="img" aria-label="Streak fire core">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071022"/>
      <stop offset="100%" stop-color="#102042"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe6a7"/>
      <stop offset="45%" stop-color="#ff9f43"/>
      <stop offset="100%" stop-color="#ff4d00"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4d00"/>
      <stop offset="50%" stop-color="#ffd166"/>
      <stop offset="100%" stop-color="#00d1b2"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="520" height="260" rx="18" fill="url(#panel)"/>
  <rect x="8" y="8" width="504" height="244" rx="14" fill="none" stroke="#2d4f7a" stroke-opacity="0.45"/>

  <g filter="url(#glow)">
    <circle cx="260" cy="130" r="44" fill="url(#core)">
      <animate attributeName="r" values="40;48;40" dur="1.8s" repeatCount="indefinite"/>
    </circle>

    <circle cx="260" cy="130" r="78" fill="none" stroke="url(#ring)" stroke-width="6" stroke-linecap="round" stroke-dasharray="60 18 24 14">
      <animateTransform attributeName="transform" type="rotate" from="0 260 130" to="360 260 130" dur="7s" repeatCount="indefinite"/>
    </circle>

    <circle cx="260" cy="130" r="104" fill="none" stroke="#00d1b2" stroke-opacity="0.45" stroke-width="2" stroke-dasharray="8 12">
      <animateTransform attributeName="transform" type="rotate" from="360 260 130" to="0 260 130" dur="9s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g fill="#ff8f00" opacity="0.85">
    <circle cx="122" cy="68" r="3">
      <animate attributeName="cx" values="122;420" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="68;188;76" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.95;0" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="398" cy="194" r="2.6">
      <animate attributeName="cx" values="398;120" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="194;82;172" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="184" cy="204" r="2.2">
      <animate attributeName="cx" values="184;342" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="204;56;162" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.92;0" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <text x="260" y="38" text-anchor="middle" fill="#e7f1ff" font-family="Segoe UI, Tahoma, sans-serif" font-size="20" font-weight="700" letter-spacing="1.1">STREAK REACTOR</text>
  <text x="260" y="228" text-anchor="middle" fill="#8ac9ff" font-family="Segoe UI, Tahoma, sans-serif" font-size="14" font-weight="600" letter-spacing="1.6">CONSISTENCY POWERS THE FIRE</text>
</svg>
