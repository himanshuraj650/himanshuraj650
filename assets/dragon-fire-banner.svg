<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="Animated dragon fire banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070b15"/>
      <stop offset="50%" stop-color="#111a2d"/>
      <stop offset="100%" stop-color="#1b2948"/>
    </linearGradient>
    <linearGradient id="flare" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff4d00"/>
      <stop offset="45%" stop-color="#ff8f00"/>
      <stop offset="100%" stop-color="#ffd166"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>

  <g opacity="0.26" fill="#2b4f7a">
    <circle cx="70" cy="55" r="2"/>
    <circle cx="220" cy="130" r="2"/>
    <circle cx="410" cy="72" r="2"/>
    <circle cx="590" cy="102" r="2"/>
    <circle cx="780" cy="42" r="2"/>
    <circle cx="940" cy="118" r="2"/>
    <circle cx="1100" cy="64" r="2"/>
  </g>

  <path d="M0 250 C220 230, 440 260, 620 230 C840 196, 1030 250, 1200 220 L1200 320 L0 320 Z" fill="#081428" opacity="0.9"/>
  <path d="M0 270 C260 242, 460 292, 700 242 C930 196, 1080 272, 1200 240 L1200 320 L0 320 Z" fill="#0d1d36" opacity="0.96"/>

  <g filter="url(#softGlow)">
    <text x="50%" y="88" text-anchor="middle" fill="#f4f8ff" font-family="Segoe UI, Tahoma, sans-serif" font-size="46" font-weight="700" letter-spacing="1.1">
      HIMANSHU RAJ
    </text>
  </g>

  <g id="dragon" transform="translate(220 178)">
    <animateTransform attributeName="transform" type="translate" from="120 178" to="980 178" dur="8s" repeatCount="indefinite"/>

    <path d="M20 52 L66 24 L135 18 L172 34 L204 31 L170 48 L214 56 L168 64 L145 90 L114 72 L90 80 L79 64 L45 70 Z"
          fill="#2a2f49" stroke="#94b8ff" stroke-width="2"/>
    <path d="M83 37 L100 27 L120 34 L112 45 L95 46 Z" fill="#93b9ff" opacity="0.84"/>
    <circle cx="166" cy="43" r="3.3" fill="#ffd166">
      <animate attributeName="r" values="2.5;3.8;2.5" dur="0.8s" repeatCount="indefinite"/>
    </circle>

    <path d="M209 53 C252 41, 314 43, 369 55 C319 75, 265 77, 209 68 Z" fill="url(#flare)" opacity="0.96">
      <animate attributeName="d"
               values="M209 53 C252 41, 314 43, 369 55 C319 75, 265 77, 209 68 Z;
                       M209 53 C258 33, 322 46, 387 58 C321 86, 264 84, 209 68 Z;
                       M209 53 C252 41, 314 43, 369 55 C319 75, 265 77, 209 68 Z"
               dur="0.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.82;1;0.82" dur="0.7s" repeatCount="indefinite"/>
    </path>

    <circle cx="250" cy="58" r="4" fill="#ff8f00" opacity="0.8">
      <animate attributeName="cx" values="240;430" dur="1.1s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="58;44;72" dur="1.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0" dur="1.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="270" cy="60" r="3.5" fill="#ffd166" opacity="0.86">
      <animate attributeName="cx" values="250;450" dur="1.25s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="60;40;68" dur="1.25s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0" dur="1.25s" repeatCount="indefinite"/>
    </circle>
    <circle cx="240" cy="50" r="3" fill="#ff4d00" opacity="0.88">
      <animate attributeName="cx" values="232;420" dur="0.95s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="50;30;66" dur="0.95s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.92;0" dur="0.95s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
