name: Generate Dragon Contribution Trail

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate contribution snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: himanshuraj650
          outputs: |
            dist/dragon-trail.svg?palette=github-dark
            dist/dragon-trail-fire.svg?color_snake=%23ff6a00&color_dots=%23161b22,%230e4429,%23026d32,%2326a641,%2339d353

      - name: Publish generated files to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
